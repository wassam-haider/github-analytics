name: Collect GitHub Analytics Data

on:
  schedule:
    # Runs every 30 minutes. GitHub Actions schedules are best-effort and
    # can be delayed under load — don't expect exact timing.
    - cron: "*/30 * * * *"
  workflow_dispatch:  # lets you trigger it manually from the Actions tab too

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          GITHUB_TOKEN: ${{ secrets.GH_API_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REPOS_PER_RUN: "20"
        run: python collector.py