name: ML Model Training

on:
  workflow_dispatch:
  schedule:
    # Run once a day at 2:00 AM UTC (after the ETL pipeline finishes)
    - cron: "0 2 * * *"

jobs:
  train-model:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-etl.txt

      - name: Run ML Training Pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_USERNAME: ${{ vars.DAGSHUB_USER }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_USER: ${{ vars.DAGSHUB_USER }}
          DAGSHUB_REPO: ${{ vars.DAGSHUB_REPO }}
        run: python train_model.py
